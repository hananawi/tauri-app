name: Build

on:
  push:
    # 推到 main 或打 v* 标签都触发
    branches: [main]
    tags: ['v*']
  # Actions 页面手动跑
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            build-args: --target universal-apple-darwin
            artifact-name: tauri-app-macos-dmg
            artifact-path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - platform: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            # Windows 只产出 NSIS 安装包
            build-args: --bundles nsis
            artifact-name: tauri-app-windows-nsis
            artifact-path: src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # 不传 version，让 action 读 package.json 里 packageManager 字段
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (release)
        run: pnpm tauri build ${{ matrix.build-args }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: warn
