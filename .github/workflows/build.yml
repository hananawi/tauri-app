name: build

on:
  push:
    # 推到 main 或打 v* 标签都触发
    branches: [main]
    tags: ['v*']
  # PR 也触发，验完再合
  pull_request:
    branches: [main]
  # Actions 页面手动跑
  workflow_dispatch:

jobs:
  test-and-build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      # 一边挂掉不阻塞另一边，方便看清究竟哪个平台出问题。
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
          - os: macos-14
            label: macos-aarch64
            target: aarch64-apple-darwin
          - os: macos-13
            label: macos-x86_64
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # 与 main 上 Node 24 保持一致。
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: pnpm tsc -p tsconfig.json --noEmit

      - name: Frontend unit tests (Vitest)
        run: pnpm test:unit

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --target ${{ matrix.target }} --locked

      - name: Build Tauri (release)
        run: pnpm tauri build --target ${{ matrix.target }}

      # ---- 产物 sanity 检查：MSI / NSIS / DMG 文件大小、PE 头、镜像可挂载 ----

      - name: Sanity check Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/${{ matrix.target }}/release/bundle"
          $msi = Get-ChildItem -Path "$bundle/msi/*.msi" -ErrorAction Stop
          $exe = Get-ChildItem -Path "$bundle/nsis/*.exe" -ErrorAction Stop
          foreach ($f in @($msi, $exe)) {
            if ($f.Length -lt 5MB) {
              throw "$($f.Name) too small ($($f.Length) bytes); build likely incomplete"
            }
            Write-Host "$($f.Name) OK ($([math]::Round($f.Length / 1MB, 2)) MB)"
          }
          # PE / MZ header sanity check on the NSIS installer.
          $head = [System.IO.File]::ReadAllBytes($exe.FullName)[0..1]
          $magic = [System.Text.Encoding]::ASCII.GetString($head)
          if ($magic -ne 'MZ') {
            throw "NSIS .exe missing MZ header (got '$magic')"
          }
          Write-Host "PE header check OK"

      - name: Sanity check macOS artifacts
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          bundle="src-tauri/target/${{ matrix.target }}/release/bundle"
          dmg=$(ls "$bundle"/dmg/*.dmg 2>/dev/null | head -n1 || true)
          if [ -z "$dmg" ]; then
            echo "DMG not found in $bundle/dmg/"
            ls -R "$bundle" || true
            exit 1
          fi
          size=$(stat -f%z "$dmg")
          if [ "$size" -lt 5000000 ]; then
            echo "DMG too small: $size bytes; build likely incomplete"
            exit 1
          fi
          file "$dmg"
          # hdiutil 既验证 checksum 又验证镜像可挂载，是 DMG 最直观的健康检查。
          hdiutil verify "$dmg"
          echo "DMG OK ($((size/1024/1024)) MB)"

      # ---- Windows smoke launch：启动 exe，10s 后看进程是否还活着；
      #      验证产物能链接到 WebView2、不在 init_app 阶段崩溃。
      #      真正的 tauri-driver E2E 见 TODO（macOS 平台不支持，单独 PR 跟进）。
      - name: Windows smoke launch
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target/${{ matrix.target }}/release/tauri-app.exe" -ErrorAction Stop
          $p = Start-Process -FilePath $exe.FullName -PassThru
          Start-Sleep -Seconds 10
          if ($p.HasExited) {
            throw "App exited prematurely with code $($p.ExitCode); binary likely crashed on startup"
          }
          Write-Host "Smoke launch OK; pid=$($p.Id) still alive after 10s"
          Stop-Process -Id $p.Id -Force

      - name: Upload Windows installers
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-app-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload macOS DMG
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-app-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
